<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Omrekentool — Koolstraweb</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #f0f0f0;
  --surface:   #ffffff;
  --border:    #d8d8d8;
  --wood:      #4a6fa5;
  --wood2:     #2d4e7e;
  --text:      #1a2332;
  --muted:     #7a8a9a;
  --result-bg: #e8edf4;
  --input-bg:  #f8f8f8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 100; opacity: 0.3;
}
.grain-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.grain-bg::after {
  content: ''; position: absolute; inset: -50%;
  background: repeating-linear-gradient(92deg, transparent, transparent 60px, rgba(74,111,165,0.03) 60px, rgba(74,111,165,0.03) 61px);
  transform: rotate(-3deg);
}
header {
  position: relative; z-index: 10;
  padding: 48px 24px 32px;
  max-width: 620px; margin: 0 auto;
}
.back-link {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--muted); text-decoration: none; margin-bottom: 24px; transition: color 0.2s;
}
.back-link:hover { color: var(--wood); }
.logo { font-family: 'Bebas Neue', sans-serif; font-size: clamp(40px, 10vw, 68px); letter-spacing: 4px; line-height: 1; color: var(--text); margin-bottom: 6px; }
.logo span { color: var(--wood); }
.tagline { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: var(--muted); margin-bottom: 24px; }
.divider { width: 100%; height: 1px; background: linear-gradient(90deg, var(--wood2), transparent); margin-bottom: 32px; }
main { position: relative; z-index: 10; max-width: 620px; margin: 0 auto; padding: 0 24px 80px; }

/* Search */
.search-wrap { width: 100%; margin-bottom: 4px; position: relative; }
.search-wrap input {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  padding: 14px 44px 14px 44px; color: var(--text);
  font-family: 'DM Mono', monospace; font-size: 16px; outline: none; transition: border-color 0.2s;
}
.search-wrap input:focus { border-color: var(--wood); }
.search-wrap input::placeholder { color: var(--muted); }
.search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 18px; pointer-events: none; }
.search-hint { font-size: 10px; color: var(--muted); letter-spacing: 1px; margin-top: 8px; margin-bottom: 16px; }
.reset-btn {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: var(--muted); font-size: 18px;
  cursor: pointer; padding: 4px; display: none; line-height: 1;
}
.reset-btn:hover { color: var(--wood2); }

/* Result card */
.result-card {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  border-top: 2px solid var(--wood); padding: 24px; margin-bottom: 4px;
  display: none; flex-direction: column; gap: 12px;
  animation: fadeIn 0.2s ease;
}
.result-card.show { display: flex; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.result-nominal { font-family: 'Bebas Neue', sans-serif; font-size: 48px; letter-spacing: 2px; color: var(--text); line-height: 1; }
.result-nominal span { color: var(--wood); }
.result-note { font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
.result-dims { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-top: 4px; }
.dim-box { background: var(--result-bg); border: 1px solid var(--border); padding: 14px; }
.dim-box .label { font-size: 9px; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 6px; }
.dim-box .value { font-size: 20px; font-weight: 500; color: var(--text); }
.dim-box .value.metric { color: var(--wood2); }
.actual-note { font-size: 10px; color: var(--wood); letter-spacing: 1px; padding-top: 8px; border-top: 1px solid var(--border); }

/* Section labels */
.section-label {
  width: 100%; font-size: 9px; letter-spacing: 4px; text-transform: uppercase;
  color: var(--muted); padding: 4px 0 10px; border-bottom: 1px solid var(--border); margin-bottom: 4px;
}

/* Fraction grid */
.frac-grid { width: 100%; display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-bottom: 4px; }
.frac-chip {
  background: var(--surface); border: 1px solid var(--border); padding: 12px;
  cursor: pointer; transition: border-color 0.15s, background 0.15s;
  display: flex; flex-direction: column; gap: 4px;
}
.frac-chip:hover, .frac-chip.active { border-color: var(--wood); background: var(--result-bg); }
.fc-label { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 1px; color: var(--text); }
.fc-mm { font-size: 11px; color: var(--wood2); }

/* Lumber grid */
.col-header {
  width: 100%; display: grid; grid-template-columns: 90px 1fr 1fr;
  padding: 0 14px 8px; gap: 8px;
}
.col-header span { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
.col-header span:last-child { text-align: right; }
.lumber-grid { width: 100%; display: flex; flex-direction: column; gap: 2px; }
.lumber-row {
  display: grid; grid-template-columns: 90px 1fr 1fr; align-items: center;
  background: var(--surface); border: 1px solid var(--border);
  padding: 10px 14px; cursor: pointer; transition: border-color 0.15s, background 0.15s; gap: 8px;
}
.lumber-row:hover, .lumber-row.active { border-color: var(--wood); background: var(--result-bg); }
.lumber-row .nominal { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1px; color: var(--text); }
.lumber-row .actual-in { font-size: 12px; color: var(--muted); }
.lumber-row .actual-mm { font-size: 13px; color: var(--wood2); text-align: right; }

footer {
  position: relative; z-index: 10; border-top: 1px solid var(--border);
  padding: 20px 24px; max-width: 620px; margin: 0 auto;
  display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;
}
.footer-brand { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 3px; color: var(--muted); }
.footer-brand span { color: var(--wood); }
.footer-note { font-size: 9px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
header { animation: fadeUp 0.5s ease both; }
@media (max-width: 480px) {
  header { padding: 32px 16px 24px; }
  main { padding: 0 16px 60px; }
  .frac-grid { grid-template-columns: repeat(2, 1fr); }
  .result-dims { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="grain-bg"></div>
<header>
  <a class="back-link" href="https://koolstraweb.nl">← Koolstraweb</a>
  <div class="logo">OMREKEN<span>TOOL</span></div>
  <div class="tagline">Nominal vs Actual — Imperial to Metric</div>
  <div class="divider"></div>
</header>
<main>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder='2x4, 1x6, 1/4"…' oninput="doSearch()" autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="reset-btn" id="resetBtn" onclick="resetAll()" title="Reset">✕</button>
  </div>
  <div class="search-hint">Type een maat of tik een rij hieronder — <button onclick="resetAll()" style="background:none;border:none;color:var(--wood);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;cursor:pointer;text-transform:uppercase;padding:0;">↺ Reset</button></div>

  <div class="result-card" id="resultCard">
    <div class="result-nominal" id="rNominal"></div>
    <div class="result-note">Nominal size (what you ask for in the store)</div>
    <div class="result-dims">
      <div class="dim-box"><div class="label">Actual — Inches</div><div class="value" id="rActualIn"></div></div>
      <div class="dim-box"><div class="label">Actual — Metric</div><div class="value metric" id="rActualMm"></div></div>
    </div>
    <div class="actual-note" id="rNote"></div>
  </div>

  <div class="section-label" style="margin-top:8px">Inch fractions → mm</div>
  <div class="frac-grid" id="fracGrid"></div>

  <div class="section-label" style="margin-top:16px">Lumber — nominal vs actual</div>
  <div class="col-header">
    <span>Nominal</span><span>Actual (in)</span><span>Actual (mm)</span>
  </div>
  <div class="lumber-grid" id="lumberGrid"></div>
</main>
<footer>
  <div class="footer-brand">KOOLSTRA<span>WEB</span></div>
  <div class="footer-note">Werkplaats tools</div>
</footer>
<script>
const lumber = [
  ['1×2',0.75,1.5],['1×3',0.75,2.5],['1×4',0.75,3.5],
  ['1×6',0.75,5.5],['1×8',0.75,7.25],['1×10',0.75,9.25],['1×12',0.75,11.25],
  ['2×2',1.5,1.5],['2×3',1.5,2.5],['2×4',1.5,3.5],
  ['2×6',1.5,5.5],['2×8',1.5,7.25],['2×10',1.5,9.25],['2×12',1.5,11.25],
  ['4×4',3.5,3.5],['4×6',3.5,5.5],['4×8',3.5,7.25],
  ['6×6',5.5,5.5],['6×8',5.5,7.25],
  ['1/4" ply',null,0.25],['1/2" ply',null,0.5],
  ['5/8" ply',null,0.625],['3/4" ply',null,0.75],
];
const fractions = [
  ['1/16"',1/16],['1/8"',1/8],['3/16"',3/16],
  ['1/4"',1/4],['5/16"',5/16],['3/8"',3/8],
  ['7/16"',7/16],['1/2"',1/2],['9/16"',9/16],
  ['5/8"',5/8],['11/16"',11/16],['3/4"',3/4],
  ['7/8"',7/8],['1"',1],['1-1/4"',1.25],
  ['1-1/2"',1.5],['2"',2],['3"',3],
];
function inToMm(v) { return Math.round(v*25.4*10)/10; }
function fmtIn(w,h) { return w===null?`${h}":`${w}" × ${h}"`; }
function fmtMm(w,h) { return w===null?`${inToMm(h)} mm`:`${inToMm(w)} × ${inToMm(h)} mm`; }
function showResult(item, rowEl) {
  document.querySelectorAll('.lumber-row,.frac-chip').forEach(r=>r.classList.remove('active'));
  if(rowEl) rowEl.classList.add('active');
  const [nom,w,h]=item;
  document.getElementById('rNominal').innerHTML=nom.replace('×','<span>×</span>');
  document.getElementById('rActualIn').textContent=fmtIn(w,h);
  document.getElementById('rActualMm').textContent=fmtMm(w,h);
  document.getElementById('rNote').textContent=w!==null?`A "${nom}" is actually ${inToMm(w)}×${inToMm(h)} mm`:`${nom} = ${inToMm(h)} mm`;
  document.getElementById('resultCard').classList.add('show');
  document.getElementById('resultCard').scrollIntoView({behavior:'smooth',block:'nearest'});
}
function buildFracs() {
  const grid=document.getElementById('fracGrid');
  fractions.forEach(([label,val])=>{
    const chip=document.createElement('div');
    chip.className='frac-chip';
    chip.innerHTML=`<span class="fc-label">${label}</span><span class="fc-mm">${inToMm(val)} mm</span>`;
    chip.onclick=()=>showResult([label,null,val],chip);
    grid.appendChild(chip);
  });
}
function buildGrid(items) {
  const grid=document.getElementById('lumberGrid');
  grid.innerHTML='';
  items.forEach(item=>{
    const [nom,w,h]=item;
    const row=document.createElement('div');
    row.className='lumber-row';
    row.innerHTML=`<div class="nominal">${nom}</div><div class="actual-in">${fmtIn(w,h)}</div><div class="actual-mm">${fmtMm(w,h)}</div>`;
    row.onclick=()=>showResult(item,row);
    grid.appendChild(row);
  });
}
function resetAll() {
  document.getElementById('searchInput').value='';
  document.getElementById('resetBtn').style.display='none';
  document.getElementById('resultCard').classList.remove('show');
  document.querySelectorAll('.lumber-row,.frac-chip').forEach(r=>r.classList.remove('active'));
  document.querySelectorAll('.frac-chip').forEach(c=>c.style.display='');
  buildGrid(lumber);
  window.scrollTo({top:0,behavior:'smooth'});
}
function doSearch() {
  const q=document.getElementById('searchInput').value.toLowerCase().replace(/\s/g,'').replace('by','x');
  document.getElementById('resetBtn').style.display=q?'block':'none';
  const matchedFracs=fractions.filter(([l])=>l.toLowerCase().replace(/\s/g,'').includes(q));
  const matchedLumber=lumber.filter(([nom])=>{
    const n=nom.toLowerCase().replace(/[×\s]/g,'x');
    return n.includes(q)||n.replace('x','').includes(q);
  });
  if(!q){buildGrid(lumber);document.querySelectorAll('.frac-chip').forEach(c=>c.style.display='');return;}
  buildGrid(matchedLumber);
  document.querySelectorAll('.frac-chip').forEach((c,i)=>{
    c.style.display=matchedFracs.includes(fractions[i])?'':'none';
  });
  if(matchedFracs.length===1&&matchedLumber.length===0){
    showResult([matchedFracs[0][0],null,matchedFracs[0][1]],document.querySelector('.frac-chip:not([style*="none"])'));
  } else if(matchedLumber.length===1){
    showResult(matchedLumber[0],document.querySelector('.lumber-row'));
  }
}
buildFracs();
buildGrid(lumber);
</script>
</body>
</html>
